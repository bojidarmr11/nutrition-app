<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriTrack">
<meta name="theme-color" content="#0f0f0f">
<title>NutriTrack</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap');
:root {
  --bg:#0f0f0f; --bg2:#181818; --bg3:#222; --border:#2a2a2a;
  --text:#f0ede8; --text2:#8a8680; --text3:#555;
  --accent:#c8f060; --accent2:#60c8f0; --accent3:#f09060;
  --red:#f06060; --yellow:#f0d060; --purple:#c060f0;
  --r:12px; --r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:90px;overflow-x:hidden}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 12px;position:sticky;top:0;background:var(--bg);z-index:100;border-bottom:1px solid var(--border)}
.topbar-logo{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.topbar-logo span{color:var(--accent)}
.avatar-pill{display:flex;align-items:center;gap:8px;cursor:pointer;background:var(--bg3);border-radius:999px;padding:4px 14px 4px 4px}
.avatar-pill img{width:28px;height:28px;border-radius:50%;object-fit:cover;display:block}
.avatar-pill span{font-size:12px;font-weight:600;color:var(--text)}

/* DAY TOGGLE */
.day-toggle-bar{padding:12px 20px;display:flex;gap:8px}
.day-btn{flex:1;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;padding:8px;border-radius:var(--r2);border:1.5px solid var(--border);cursor:pointer;background:transparent;color:var(--text2);transition:all .2s;letter-spacing:.3px}
.day-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(200,240,96,.08)}

/* DATE */
.date-bar{padding:0 20px 16px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.5px}

/* MACRO CARD */
.macro-card{margin:0 20px 20px;background:var(--bg2);border-radius:var(--r);padding:18px;border:1px solid var(--border)}
.macro-card-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
.macro-card-title{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:1px;text-transform:uppercase}
.macro-card-kcal{font-size:28px;font-weight:800;letter-spacing:-1px}
.macro-card-kcal span{font-size:13px;font-weight:500;color:var(--text2)}
.macro-bars{display:flex;flex-direction:column;gap:10px}
.macro-row{display:flex;align-items:center;gap:10px}
.macro-label{font-family:'DM Mono',monospace;font-size:10px;width:14px}
.macro-bar-wrap{flex:1;height:6px;background:var(--bg3);border-radius:999px;overflow:hidden}
.macro-bar-fill{height:100%;border-radius:999px;transition:width .4s cubic-bezier(.34,1.56,.64,1)}
.bar-p{background:var(--accent)} .bar-c{background:var(--accent2)} .bar-f{background:var(--accent3)} .bar-k{background:var(--yellow)}
.macro-val{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);width:70px;text-align:right}
.macro-val.over{color:var(--red)}

/* SECTIONS */
.section{padding:0 20px;margin-bottom:8px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:13px;font-weight:700;letter-spacing:.3px}
.section-total{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2)}

/* MEAL SLOT */
.meal-slot{background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.meal-slot-header{display:flex;align-items:center;padding:12px 14px;gap:10px}
.meal-slot-info{flex:1}
.meal-slot-name{font-size:13px;font-weight:600}
.meal-slot-desc{font-size:11px;color:var(--text2);margin-top:1px}
.meal-slot-kcal{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);font-weight:500}
.meal-slot-remove{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;line-height:1;transition:color .2s}
.meal-slot-remove:hover{color:var(--red)}
.meal-macros-bar{display:flex;padding:0 14px 10px;gap:12px}
.meal-macro-pill{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:999px;background:var(--bg3);color:var(--text2)}
.meal-macro-pill.p{color:var(--accent)} .meal-macro-pill.c{color:var(--accent2)} .meal-macro-pill.f{color:var(--accent3)}

/* ADD BUTTON */
.add-meal-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;background:transparent;border:1.5px dashed var(--border);border-radius:var(--r);color:var(--text2);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:8px;letter-spacing:.3px}
.add-meal-btn:hover{border-color:var(--accent);color:var(--accent)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:10px 0 20px;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0;color:var(--text3);font-family:'Syne',sans-serif;font-size:10px;font-weight:600;transition:color .2s;letter-spacing:.3px}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;max-height:88vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.2,.64,1)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:999px;margin:12px auto 0;flex-shrink:0}
.modal-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:var(--bg3);border:none;color:var(--text2);font-size:18px;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* FILTER BAR */
.meal-type-filter{display:flex;gap:6px;padding:0 20px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.meal-type-filter::-webkit-scrollbar{display:none}
.filter-chip{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;padding:5px 12px;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.3px}
.filter-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(200,240,96,.08)}

/* MEAL LIST */
.modal-scroll{overflow-y:auto;flex:1;padding:0 20px 12px}
.meal-list-item{display:flex;align-items:center;padding:12px 14px;background:var(--bg3);border-radius:var(--r2);margin-bottom:8px;cursor:pointer;border:1.5px solid transparent;transition:border-color .15s;gap:12px}
.meal-list-item:hover{border-color:var(--accent)}
.meal-list-info{flex:1}
.meal-list-name{font-size:13px;font-weight:600;margin-bottom:2px}
.meal-list-desc{font-size:11px;color:var(--text2)}
.meal-list-macros{text-align:right}
.meal-list-kcal{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);font-weight:500}
.meal-list-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:2px}

/* CUSTOM ENTRY */
.custom-entry-section{padding:0 20px 16px;border-top:1px solid var(--border);flex-shrink:0}
.custom-entry-title{font-size:12px;font-weight:600;color:var(--text2);margin:14px 0 10px;letter-spacing:.5px;text-transform:uppercase}
.custom-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.custom-input-wrap{display:flex;flex-direction:column;gap:4px}
.custom-input-label{font-size:10px;color:var(--text2);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.custom-input{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r2);padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;width:100%;transition:border-color .15s}
.custom-input:focus{outline:none;border-color:var(--accent)}
.custom-name-input{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r2);padding:10px 12px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;width:100%;margin-bottom:8px;transition:border-color .15s}
.custom-name-input:focus{outline:none;border-color:var(--accent)}
.custom-name-input::placeholder{color:var(--text3)}
.submit-btn{flex:1;padding:13px;background:var(--accent);color:#0f0f0f;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:var(--r2);cursor:pointer;letter-spacing:.5px;transition:opacity .15s;width:100%}
.submit-btn:hover{opacity:.9}

/* HISTORY */
.history-header{padding:20px 20px 8px}
.history-title{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.history-subtitle{font-size:12px;color:var(--text2)}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px}
.month-nav-btn{background:var(--bg3);border:none;color:var(--text2);font-size:16px;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-label{font-size:14px;font-weight:700;letter-spacing:.3px}
.calendar-grid{padding:0 20px;margin-bottom:20px}
.cal-day-labels{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
.cal-day-label{text-align:center;font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;border:1.5px solid transparent;position:relative}
.cal-day.empty{cursor:default}
.cal-day.has-data{background:var(--bg2);border-color:var(--border)}
.cal-day.has-data:hover{border-color:var(--accent)}
.cal-day.today{border-color:var(--accent2)}
.cal-day.selected{border-color:var(--accent);background:rgba(200,240,96,.1)}
.cal-day-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2)}
.cal-day.has-data .cal-day-num{color:var(--text)}
.cal-day.today .cal-day-num{color:var(--accent2)}
.cal-day.selected .cal-day-num{color:var(--accent);font-weight:600}
.cal-dot{width:4px;height:4px;border-radius:50%;margin-top:2px}
.cal-dot.green{background:var(--accent)} .cal-dot.yellow{background:var(--yellow)} .cal-dot.red{background:var(--red)}
.history-detail{padding:0 20px}
.history-day-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.history-day-date{font-size:14px;font-weight:700}
.history-day-kcal{font-family:'DM Mono',monospace;font-size:13px;color:var(--yellow)}
.history-macro-row{display:flex;gap:8px;margin-bottom:14px}
.history-macro-chip{flex:1;background:var(--bg2);border-radius:var(--r2);padding:10px 8px;text-align:center;border:1px solid var(--border)}
.history-macro-chip-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}
.history-macro-chip-label{font-size:9px;color:var(--text3);margin-top:2px;letter-spacing:.5px;text-transform:uppercase}
.history-meal-item{background:var(--bg2);border-radius:var(--r2);padding:10px 14px;margin-bottom:6px;border:1px solid var(--border)}
.history-meal-top{display:flex;justify-content:space-between;align-items:center}
.history-meal-name{font-size:12px;font-weight:600}
.history-meal-kcal{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent)}
.history-meal-slot{font-size:10px;color:var(--text3);margin-top:2px}
.empty-history{text-align:center;padding:40px 0;color:var(--text3);font-size:13px}
.empty-history-icon{font-size:32px;margin-bottom:10px}

/* STATS */
.stat-card{background:var(--bg2);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.stat-card-label{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.stat-card-value{font-size:32px;font-weight:800;letter-spacing:-1px}
.stat-card-sub{font-size:12px;color:var(--text2);margin-top:4px}

/* MENU TAB */
.menu-header{padding:20px 20px 0}
.menu-title{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.menu-subtitle{font-size:12px;color:var(--text2);margin-bottom:16px}
.menu-cat-tabs{display:flex;gap:6px;padding:0 20px 16px;overflow-x:auto;scrollbar-width:none}
.menu-cat-tabs::-webkit-scrollbar{display:none}
.menu-cat-btn{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;padding:6px 14px;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
.menu-cat-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(200,240,96,.08)}
.menu-list{padding:0 20px}
.menu-meal-card{background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.menu-meal-top{display:flex;align-items:center;padding:14px;gap:12px;cursor:pointer}
.menu-meal-info{flex:1}
.menu-meal-name{font-size:13px;font-weight:700}
.menu-meal-desc{font-size:11px;color:var(--text2);margin-top:2px}
.menu-meal-kcal{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);font-weight:500;white-space:nowrap}
.menu-meal-expand{color:var(--text3);font-size:14px;transition:transform .2s;margin-left:4px;flex-shrink:0}
.menu-meal-expand.open{transform:rotate(180deg)}
.menu-meal-macros{display:flex;gap:10px;padding:0 14px 12px}
.menu-meal-pill{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:999px;background:var(--bg3)}
.menu-meal-detail{padding:0 14px 14px;border-top:1px solid var(--border);display:none}
.menu-meal-detail.open{display:block}
.menu-detail-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin:12px 0 6px}
.menu-detail-text{font-size:12px;color:var(--text2);line-height:1.5}
.menu-detail-actions{display:flex;gap:8px;margin-top:14px}
.menu-edit-btn{flex:1;padding:9px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r2);color:var(--text2);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.menu-edit-btn:hover{border-color:var(--accent);color:var(--accent)}
.menu-delete-btn{padding:9px 16px;background:transparent;border:1.5px solid var(--border);border-radius:var(--r2);color:var(--text3);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.menu-delete-btn:hover{border-color:var(--red);color:var(--red)}
.add-menu-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;background:transparent;border:1.5px dashed var(--border);border-radius:var(--r);color:var(--text2);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:16px;letter-spacing:.3px}
.add-menu-btn:hover{border-color:var(--accent);color:var(--accent)}

/* EDIT MEAL MODAL */
.edit-input{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r2);padding:10px 12px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;width:100%;margin-bottom:10px;transition:border-color .15s}
.edit-input:focus{outline:none;border-color:var(--accent)}
.edit-input::placeholder{color:var(--text3)}
.edit-textarea{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r2);padding:10px 12px;color:var(--text);font-family:'Syne',sans-serif;font-size:12px;width:100%;margin-bottom:10px;min-height:80px;resize:vertical;transition:border-color .15s;line-height:1.5}
.edit-textarea:focus{outline:none;border-color:var(--accent)}
.edit-textarea::placeholder{color:var(--text3)}
.edit-label{font-size:10px;color:var(--text2);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;display:block}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.edit-field{display:flex;flex-direction:column;gap:4px}
.edit-macro-input{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r2);padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;width:100%;transition:border-color .15s}
.edit-macro-input:focus{outline:none;border-color:var(--accent)}
.edit-cat-select{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r2);padding:10px 12px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;width:100%;margin-bottom:10px;appearance:none;transition:border-color .15s}
.edit-cat-select:focus{outline:none;border-color:var(--accent)}
.save-meal-btn{width:100%;padding:13px;background:var(--accent);color:#0f0f0f;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:var(--r2);cursor:pointer;letter-spacing:.5px}

/* PROFILE SCREEN */
.profile-screen{position:fixed;inset:0;background:#0f0f0f;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.profile-card-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer;gap:12px}
.profile-img-wrap{width:140px;height:140px;border-radius:16px;overflow:hidden;border:3px solid var(--border);transition:all .2s}
.profile-img-wrap:hover{border-color:var(--accent);transform:scale(1.04)}
.profile-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.profile-name{font-size:16px;font-weight:700;color:var(--text)}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state-icon{font-size:40px;margin-bottom:12px}
.empty-state-text{font-size:13px}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#0f0f0f;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;padding:10px 20px;border-radius:999px;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;letter-spacing:.3px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- PROFILE SCREEN -->
<div class="profile-screen" id="profileScreen">
  <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#f0ede8;letter-spacing:-.5px;margin-bottom:6px;text-align:center">Who are you today?</div>
  <div style="font-family:'DM Mono',monospace;font-size:11px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:48px">Select your profile</div>

let currentUser    = 'bobby';
let currentDayType = 'training';
let currentSlot    = 'breakfast';
let activeFilter   = 'all';
let calYear, calMonth, selectedDay = null;
let menuActiveCat  = 'breakfast';
let editingMealId  = null;
let logDateOverride = null; // for backdate logging

// ============================================================
// STORAGE
// ============================================================
function dateKey(u, d) { return u + '_' + d; }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function todayKey() { return dateKey(currentUser, todayStr()); }
function logKey()   { return logDateOverride ? dateKey(currentUser, logDateOverride) : todayKey(); }

function loadLogForDate(u, d) {
  try { return JSON.parse(localStorage.getItem(dateKey(u,d)) || '[]'); } catch(e) { return []; }
}
function loadLog() { return loadLogForDate(currentUser, logDateOverride || todayStr()); }
function saveLog(log) { localStorage.setItem(logKey(), JSON.stringify(log)); }

function loadDayType() {
  return localStorage.getItem('daytype_'+currentUser+'_'+todayStr()) || 'training';
}
function saveDayType(t) {
  localStorage.setItem('daytype_'+currentUser+'_'+todayStr(), t);
}

// Meal database in localStorage
function getMeals(user) {
  try {
    const stored = localStorage.getItem('meals_'+user);
    if (stored) return JSON.parse(stored);
    // First time: seed from defaults
    localStorage.setItem('meals_'+user, JSON.stringify(DEFAULT_MEALS[user]));
    return DEFAULT_MEALS[user];
  } catch(e) { return DEFAULT_MEALS[user]; }
}
function saveMeals(user, meals) {
  localStorage.setItem('meals_'+user, JSON.stringify(meals));
}

// ============================================================
// INIT
// ============================================================
function init() {
  const now = new Date();
  document.getElementById('dateBar').textContent = now.toLocaleDateString('en-GB', {
    weekday:'long', day:'numeric', month:'long', year:'numeric'
  }).toUpperCase();
  calYear  = now.getFullYear();
  calMonth = now.getMonth();
  // Seed meals for both users on first load
  getMeals('bobby');
  getMeals('masha');
}

// ============================================================
// PROFILE
// ============================================================
function selectProfile(user) {
  currentUser    = user;
  logDateOverride = null;
  document.getElementById('topbarAvatarImg').src = AVATAR_FULL[user];
  document.getElementById('topbarName').textContent = user === 'bobby' ? 'Bobby' : 'Masha';
  document.getElementById('profileScreen').style.display = 'none';
  currentDayType = loadDayType();
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.day-btn')[currentDayType==='training'?0:1].classList.add('active');
  renderSections();
  updateTotals();
}
function goToProfiles() {
  showScreen('home');
  document.getElementById('profileScreen').style.display = 'flex';
}

// ============================================================
// HOME
// ============================================================
function renderSections() {
  const log   = loadLog();
  const slots = ['breakfast','lunch','dinner','snack'];
  let html = '';
  slots.forEach(slot => {
    const items    = log.filter(i => i.slot === slot);
    const slotKcal = items.reduce((a,b) => a+b.kcal, 0);
    html += '<div class="section"><div class="section-header"><div class="section-title">'+CAT_ICONS[slot]+' '+CAT_LABELS[slot]+'</div>';
    if (slotKcal > 0) html += '<div class="section-total">'+slotKcal+' kcal</div>';
    html += '</div>';
    if (items.length === 0) {
      html += '<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">Nothing logged yet</div>';
    } else {
      items.forEach(item => {
        const idx = log.indexOf(item);
        html += '<div class="meal-slot"><div class="meal-slot-header"><div class="meal-slot-info"><div class="meal-slot-name">'+item.name+'</div><div class="meal-slot-desc">'+item.desc+'</div></div><div class="meal-slot-kcal">'+item.kcal+'</div><button class="meal-slot-remove" onclick="removeMeal('+idx+')">&#215;</button></div><div class="meal-macros-bar"><span class="meal-macro-pill p">P '+item.p+'g</span><span class="meal-macro-pill c">C '+item.c+'g</span><span class="meal-macro-pill f">F '+item.f+'g</span></div></div>';
      });
    }
    html += '<button class="add-meal-btn" onclick="openModal(\''+ slot +'\')">'+
      (logDateOverride ? '+ Add to this day' : '+ Add '+CAT_LABELS[slot])+'</button></div>';
  });
  document.getElementById('mealSections').innerHTML = html;
}

function updateTotals() {
  const isToday = !logDateOverride || logDateOverride === todayStr();
  if (!isToday) return; // don't update today's bar if viewing past day
  const log    = loadLog();
  const target = TARGETS[currentUser][currentDayType];
  const t = log.reduce((a,b) => ({kcal:a.kcal+b.kcal,p:a.p+b.p,c:a.c+b.c,f:a.f+b.f}),{kcal:0,p:0,c:0,f:0});
  document.getElementById('totalKcal').textContent = t.kcal;
  const pct = (v,m) => Math.min(Math.round(v/m*100),100)+'%';
  const ov  = (v,m) => v > m;
  ['K','P','C','F'].forEach(x => {
    const key = x.toLowerCase() === 'k' ? 'kcal' : x.toLowerCase() === 'p' ? 'p' : x.toLowerCase() === 'c' ? 'c' : 'f';
    const tk  = x.toLowerCase() === 'k' ? 'kcal' : key;
    document.getElementById('bar'+x).style.width = pct(t[key], target[tk]);
    const val = document.getElementById('val'+x);
    val.textContent = x==='K' ? t.kcal+' / '+target.kcal : t[key]+'g / '+target[tk]+'g';
    val.className   = 'macro-val'+(ov(t[key],target[tk])?'  over':'');
  });
}

function removeMeal(idx) {
  const log = loadLog();
  log.splice(idx,1);
  saveLog(log);
  renderSections();
  if (!logDateOverride || logDateOverride===todayStr()) updateTotals();
  showToast('Removed');
}

// ============================================================
// ADD MEAL MODAL
// ============================================================
function openModal(slot) {
  currentSlot  = slot;
  activeFilter = 'all';
  document.getElementById('modalTitle').textContent = logDateOverride && logDateOverride!==todayStr()
    ? 'Add to '+formatDate(logDateOverride)+' — '+CAT_LABELS[slot]
    : 'Add '+CAT_LABELS[slot];
  document.getElementById('customName').value  = '';
  document.getElementById('customKcal').value  = '';
  document.getElementById('customP').value      = '';
  document.getElementById('customC').value      = '';
  document.getElementById('customF').value      = '';
  renderFilterBar();
  renderMealList();
  document.getElementById('addMealModal').classList.add('open');
}
function closeModal() { document.getElementById('addMealModal').classList.remove('open'); }

function renderFilterBar() {
  const cats = ['all','breakfast','lunch','dinner','snack'];
  const lbl  = {all:'All',breakfast:'Breakfast',lunch:'Lunch',dinner:'Dinner',snack:'Snacks'};
  document.getElementById('filterBar').innerHTML = cats.map(f =>
    '<button class="filter-chip'+(f===activeFilter?' active':'')+'" onclick="setFilter(\''+ f +'\')">'+lbl[f]+'</button>'
  ).join('');
}
function setFilter(f) { activeFilter=f; renderFilterBar(); renderMealList(); }

function renderMealList() {
  const meals = getMeals(currentUser);
  const list  = activeFilter==='all' ? meals : meals.filter(m => m.cat===activeFilter);
  if (!list.length) {
    document.getElementById('mealListContainer').innerHTML = '<div class="empty-state"><div class="empty-state-icon">🍽️</div><div class="empty-state-text">No meals here</div></div>';
    return;
  }
  document.getElementById('mealListContainer').innerHTML = list.map(m =>
    '<div class="meal-list-item" onclick="addMealFromList(\''+ m.id +'\')">' +
    '<div class="meal-list-info"><div class="meal-list-name">'+m.name+'</div><div class="meal-list-desc">'+m.desc+'</div></div>' +
    '<div class="meal-list-macros"><div class="meal-list-kcal">'+m.kcal+'</div><div class="meal-list-sub">P'+m.p+' C'+m.c+' F'+m.f+'</div></div></div>'
  ).join('');
}

function addMealFromList(mealId) {
  const meal = getMeals(currentUser).find(m => m.id===mealId);
  if (!meal) return;
  const log = loadLog();
  log.push({...meal, slot:currentSlot, loggedAt:Date.now()});
  saveLog(log);
  closeModal();
  renderSections();
  if (!logDateOverride || logDateOverride===todayStr()) updateTotals();
  showToast(meal.name+' added ✓');
}

function addCustomMeal() {
  const name = document.getElementById('customName').value.trim() || 'Custom meal';
  const kcal = parseInt(document.getElementById('customKcal').value)||0;
  const p    = parseInt(document.getElementById('customP').value)||0;
  const c    = parseInt(document.getElementById('customC').value)||0;
  const f    = parseInt(document.getElementById('customF').value)||0;
  if (!kcal && !p && !c && !f) { showToast('Enter at least one value'); return; }
  const log = loadLog();
  log.push({id:'custom_'+Date.now(),name,desc:'Custom entry',kcal,p,c,f,slot:currentSlot,loggedAt:Date.now()});
  saveLog(log);
  closeModal();
  renderSections();
  if (!logDateOverride || logDateOverride===todayStr()) updateTotals();
}

// ============================================================
// HISTORY
// ============================================================
function formatDate(dateStr) {
  const d = new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}

function renderCalendar() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('monthLabel').textContent = months[calMonth]+' '+calYear;
  const firstDow  = (new Date(calYear,calMonth,1).getDay()+6)%7;
  const totalDays = new Date(calYear,calMonth+1,0).getDate();
  const todayDate = todayStr();
  let html = '';
  for (let i=0;i<firstDow;i++) html += '<div class="cal-day empty"></div>';
  for (let d=1;d<=totalDays;d++) {
    const ds  = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const log = loadLogForDate(currentUser,ds);
    const has = log.length>0;
    const isT = ds===todayDate;
    const isSel = ds===selectedDay;
    const target = TARGETS[currentUser][currentDayType];
    let dot = '';
    if (has) {
      const pct = log.reduce((a,b)=>a+b.kcal,0)/target.kcal;
      dot = '<div class="cal-dot '+( pct>=.9?'green':pct>=.6?'yellow':'red')+'"></div>';
    }
    html += '<div class="cal-day'+(has?' has-data':'')+( isT?' today':'')+( isSel?' selected':'')+'" onclick="selectDay(\''+ ds +'\')">' +
      '<div class="cal-day-num">'+d+'</div>'+dot+'</div>';
  }
  document.getElementById('calGrid').innerHTML = html;
  if (selectedDay) renderDayDetail(selectedDay);
  else document.getElementById('historyDetail').innerHTML = '<div class="empty-history"><div class="empty-history-icon">📅</div>Tap a day to see details</div>';
}

function selectDay(ds) {
  selectedDay = ds;
  renderCalendar();
}

function renderDayDetail(ds) {
  const log    = loadLogForDate(currentUser,ds);
  const target = TARGETS[currentUser][currentDayType];
  const isToday = ds===todayStr();
  const label  = formatDate(ds);
  let html = '<div class="history-day-header"><div class="history-day-date">'+label+'</div></div>';

  if (log.length > 0) {
    const t = log.reduce((a,b)=>({kcal:a.kcal+b.kcal,p:a.p+b.p,c:a.c+b.c,f:a.f+b.f}),{kcal:0,p:0,c:0,f:0});
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">' +
      '<div style="font-family:DM Mono,monospace;font-size:13px;color:var(--yellow)">'+t.kcal+' kcal</div>' +
      '<div style="font-family:DM Mono,monospace;font-size:11px;color:var(--text3)">'+Math.round(t.kcal/target.kcal*100)+'% of target</div></div>';
    html += '<div class="history-macro-row">' +
      '<div class="history-macro-chip"><div class="history-macro-chip-val" style="color:var(--accent)">'+t.p+'g</div><div class="history-macro-chip-label">Protein</div></div>' +
      '<div class="history-macro-chip"><div class="history-macro-chip-val" style="color:var(--accent2)">'+t.c+'g</div><div class="history-macro-chip-label">Carbs</div></div>' +
      '<div class="history-macro-chip"><div class="history-macro-chip-val" style="color:var(--accent3)">'+t.f+'g</div><div class="history-macro-chip-label">Fat</div></div></div>';
    ['breakfast','lunch','dinner','snack'].forEach(slot => {
      const items = log.filter(i=>i.slot===slot);
      if (!items.length) return;
      html += '<div style="font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin:12px 0 6px">'+CAT_ICONS[slot]+' '+CAT_LABELS[slot]+'</div>';
      items.forEach(item => {
        html += '<div class="history-meal-item"><div class="history-meal-top"><div class="history-meal-name">'+item.name+'</div><div class="history-meal-kcal">'+item.kcal+' kcal</div></div><div class="history-meal-slot">P '+item.p+'g · C '+item.c+'g · F '+item.f+'g</div></div>';
      });
    });
  } else {
    html += '<div class="empty-history"><div class="empty-history-icon">🍽️</div>Nothing logged on this day</div>';
  }

  // ADD MEAL TO THIS DATE BUTTON
  html += '<button class="add-meal-btn" style="margin-top:16px" onclick="openBackdateModal(\''+ ds +'\')">' +
    (isToday ? '+ Add meal' : '+ Add meal to '+label)+'</button>';

  document.getElementById('historyDetail').innerHTML = html;
}

function openBackdateModal(ds) {
  logDateOverride = ds;
  // Show slot picker
  const isToday = ds===todayStr();
  openModal('dinner'); // default to dinner since that's most common backdate need
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth<0) {calMonth=11;calYear--;}
  if (calMonth>11){calMonth=0;calYear++;}
  selectedDay=null;
  renderCalendar();
}

// ============================================================
// STATS
// ============================================================
function renderStats() {
  logDateOverride = null;
  const target = TARGETS[currentUser][currentDayType];
  const log    = loadLogForDate(currentUser,todayStr());
  const t = log.reduce((a,b)=>({kcal:a.kcal+b.kcal,p:a.p+b.p,c:a.c+b.c,f:a.f+b.f}),{kcal:0,p:0,c:0,f:0});
  let streak=0;
  for(let i=0;i<30;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    if(loadLogForDate(currentUser,d.toISOString().split('T')[0]).length>0)streak++;
    else if(i>0)break;
  }
  let wt=0,wd=0;
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const dl=loadLogForDate(currentUser,d.toISOString().split('T')[0]);
    if(dl.length>0){wt+=dl.reduce((a,b)=>a+b.kcal,0);wd++;}
  }
  const wavg = wd>0?Math.round(wt/wd):0;
  document.getElementById('statsContent').innerHTML =
    '<div class="stat-card"><div class="stat-card-label">Calories today</div><div class="stat-card-value" style="color:var(--yellow)">'+t.kcal+' <span style="font-size:16px;color:var(--text2)">/ '+target.kcal+'</span></div><div class="stat-card-sub">'+Math.min(100,Math.round(t.kcal/target.kcal*100))+'% of target — '+Math.max(0,target.kcal-t.kcal)+' kcal remaining</div></div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">' +
    '<div class="stat-card"><div class="stat-card-label">Protein</div><div class="stat-card-value" style="color:var(--accent);font-size:24px">'+t.p+'g</div><div class="stat-card-sub">Target: '+target.p+'g</div></div>' +
    '<div class="stat-card"><div class="stat-card-label">Carbs</div><div class="stat-card-value" style="color:var(--accent2);font-size:24px">'+t.c+'g</div><div class="stat-card-sub">Target: '+target.c+'g</div></div>' +
    '<div class="stat-card"><div class="stat-card-label">Fat</div><div class="stat-card-value" style="color:var(--accent3);font-size:24px">'+t.f+'g</div><div class="stat-card-sub">Target: '+target.f+'g</div></div>' +
    '<div class="stat-card"><div class="stat-card-label">Streak</div><div class="stat-card-value" style="font-size:24px">'+streak+' 🔥</div><div class="stat-card-sub">Days logged in a row</div></div></div>' +
    '<div class="stat-card"><div class="stat-card-label">7-day avg calories</div><div class="stat-card-value" style="font-size:24px">'+( wavg||'—')+'</div><div class="stat-card-sub">Target: '+target.kcal+' kcal/day</div></div>' +
    '<div class="stat-card"><div class="stat-card-label">Profile</div><div class="stat-card-value" style="font-size:20px">'+( currentUser==='bobby'?'Bobby':'Masha')+'</div><div class="stat-card-sub">'+( currentDayType==='training'?'🏋️ Training day':'😴 Rest day')+' targets active</div></div>';
}

// ============================================================
// MENU TAB
// ============================================================
function renderMenu() {
  const cats  = ['breakfast','lunch','dinner','snack'];
  const meals = getMeals(currentUser).filter(m => m.cat===menuActiveCat);

  // Category tabs
  document.getElementById('menuCatTabs').innerHTML = cats.map(c =>
    '<button class="menu-cat-btn'+(c===menuActiveCat?' active':'')+'" onclick="setMenuCat(\''+ c +'\')">'+CAT_ICONS[c]+' '+CAT_LABELS[c]+'</button>'
  ).join('');

  // Meal cards
  let html = meals.map(m =>
    '<div class="menu-meal-card" id="menuCard_'+m.id+'">' +
    '<div class="menu-meal-top" onclick="toggleMenuCard(\''+ m.id +'\')">' +
    '<div class="menu-meal-info"><div class="menu-meal-name">'+m.name+'</div><div class="menu-meal-desc">'+m.desc+'</div></div>' +
    '<div class="menu-meal-kcal">'+m.kcal+' kcal</div>' +
    '<div class="menu-meal-expand" id="exp_'+m.id+'">▾</div></div>' +
    '<div class="menu-meal-macros"><span class="menu-meal-pill" style="color:var(--accent)">P '+m.p+'g</span><span class="menu-meal-pill" style="color:var(--accent2)">C '+m.c+'g</span><span class="menu-meal-pill" style="color:var(--accent3)">F '+m.f+'g</span></div>' +
    '<div class="menu-meal-detail" id="det_'+m.id+'">' +
    '<div class="menu-detail-label">Ingredients</div><div class="menu-detail-text">'+( m.ingredients||'No ingredients listed')+'</div>' +
    '<div class="menu-detail-actions"><button class="menu-edit-btn" onclick="openEditMeal(\''+ m.id +'\')">✏️ Edit</button><button class="menu-delete-btn" onclick="deleteMeal(\''+ m.id +'\')">🗑 Delete</button></div>' +
    '</div></div>'
  ).join('');

  html += '<button class="add-menu-btn" onclick="openEditMeal(null)">+ Add new meal</button>';
  document.getElementById('menuList').innerHTML = html;
}

function setMenuCat(cat) { menuActiveCat=cat; renderMenu(); }

function toggleMenuCard(id) {
  const det = document.getElementById('det_'+id);
  const exp = document.getElementById('exp_'+id);
  const open = det.classList.contains('open');
  det.classList.toggle('open', !open);
  exp.classList.toggle('open', !open);
}

function openEditMeal(id) {
  editingMealId = id;
  const meals   = getMeals(currentUser);
  const meal    = id ? meals.find(m=>m.id===id) : null;
  document.getElementById('editModalTitle').textContent = meal ? 'Edit meal' : 'New meal';
  document.getElementById('editName').value        = meal ? meal.name        : '';
  document.getElementById('editCat').value         = meal ? meal.cat         : menuActiveCat;
  document.getElementById('editDesc').value        = meal ? meal.desc        : '';
  document.getElementById('editIngredients').value = meal ? (meal.ingredients||''): '';
  document.getElementById('editKcal').value        = meal ? meal.kcal        : '';
  document.getElementById('editProt').value        = meal ? meal.p           : '';
  document.getElementById('editCarbs').value       = meal ? meal.c           : '';
  document.getElementById('editFat').value         = meal ? meal.f           : '';
  document.getElementById('editMealModal').classList.add('open');
}
function closeEditModal() { document.getElementById('editMealModal').classList.remove('open'); }

function saveMealEdit() {
  const name  = document.getElementById('editName').value.trim();
  const cat   = document.getElementById('editCat').value;
  const desc  = document.getElementById('editDesc').value.trim();
  const ingr  = document.getElementById('editIngredients').value.trim();
  const kcal  = parseInt(document.getElementById('editKcal').value)||0;
  const p     = parseInt(document.getElementById('editProt').value)||0;
  const c     = parseInt(document.getElementById('editCarbs').value)||0;
  const f     = parseInt(document.getElementById('editFat').value)||0;
  if (!name) { showToast('Enter a meal name'); return; }
  const meals = getMeals(currentUser);
  if (editingMealId) {
    const idx = meals.findIndex(m=>m.id===editingMealId);
    if (idx>-1) meals[idx] = {...meals[idx],name,cat,desc,ingredients:ingr,kcal,p,c,f};
  } else {
    meals.push({id:'meal_'+Date.now(),name,cat,desc,ingredients:ingr,kcal,p,c,f});
  }
  saveMeals(currentUser,meals);
  closeEditModal();
  menuActiveCat = cat;
  renderMenu();
  showToast(editingMealId ? 'Meal updated ✓' : 'Meal added ✓');
}

function deleteMeal(id) {
  if (!confirm('Delete this meal from your menu?')) return;
  const meals = getMeals(currentUser).filter(m=>m.id!==id);
  saveMeals(currentUser,meals);
  renderMenu();
  showToast('Meal deleted');
}

// ============================================================
// NAVIGATION
// ============================================================
function showScreen(screen) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  ['homeScreen','historyScreen','statsScreen','menuScreen'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  logDateOverride = null;
  if (screen==='home') {
    document.getElementById('homeScreen').style.display='block';
    document.getElementById('navHome').classList.add('active');
    renderSections(); updateTotals();
  } else if (screen==='history') {
    document.getElementById('historyScreen').style.display='block';
    document.getElementById('navHistory').classList.add('active');
    selectedDay=todayStr();
    renderCalendar();
  } else if (screen==='stats') {
    document.getElementById('statsScreen').style.display='block';
    document.getElementById('navStats').classList.add('active');
    renderStats();
  } else if (screen==='menu') {
    document.getElementById('menuScreen').style.display='block';
    document.getElementById('navMenu').classList.add('active');
    renderMenu();
  }
}

function setDayType(type) {
  currentDayType=type;
  saveDayType(type);
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.day-btn[onclick="setDayType(\''+ type +'\')"]').classList.add('active');
  updateTotals();
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// Close modals on backdrop click
['addMealModal','editMealModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});

// When backdate modal closes, reset logDateOverride if going back to home
document.getElementById('addMealModal').addEventListener('transitionend', function(){
  if (!this.classList.contains('open') && logDateOverride && logDateOverride!==todayStr()) {
    // re-render history detail to show new meal
    renderDayDetail(logDateOverride);
    logDateOverride = null;
  }
});

init();
</script>
